name: Fetch memecoin trends

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch: {}       # allows manual "Run workflow" button too

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests rich

      - name: Run fetcher
        run: python fetch_trends.py

      - name: Commit updated data
        run: |
          git config user.name "trend-bot"
          git config user.email "trend-bot@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "update trend data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
